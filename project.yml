name: Scout
options:
  bundleIdPrefix: com.cutetech
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  ScoutKit:
    path: ScoutKit

targets:
  Scout:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Scout/Sources
      - path: Scout/Resources/Assets.xcassets
        buildPhase: resources
      - path: Scout/Preview Content
        buildPhase: none
        type: folder
    resources:
      - path: Scout/Preview Content
        buildPhase: resources
    dependencies:
      - package: ScoutKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cutetech.scout
        PRODUCT_NAME: "Script Scout"
        # iPhone-only for the beta (phone-first UI). Avoids the iPad multitasking
        # orientation requirement; re-add iPad ("1,2") + iPad orientation keys later.
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: 2J8M8Z4QCX
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    entitlements:
      path: Scout/Scout.entitlements
      properties:
        # Sandbox disabled: this is a personal-use debug build (not App Store).
        # The sandbox blocked Process from spawning /usr/bin/zip, breaking
        # backup export/import. Re-enable + use a zip library before any release.
        com.apple.security.app-sandbox: false
        com.apple.security.personal-information.location: true
        com.apple.security.network.client: true
        # iCloud + CloudKit (project sharing / real-time sync — docs/collaboration-plan.md).
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.cutetech.scout
        com.apple.developer.icloud-services:
          - CloudKit
        # Remote (silent) push so NSPersistentCloudKitContainer gets change notifications.
        aps-environment: development
    info:
      path: Scout/Info.plist
      properties:
        # On-device / Finder display name (bundle id stays com.cutetech.scout).
        CFBundleDisplayName: "Script Scout"
        # Drive version/build from the build settings above so bumps live in one place.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # App uses only standard HTTPS / Apple crypto → exempt from export compliance.
        # Declaring this lets TestFlight uploads skip the per-build encryption question.
        ITSAppUsesNonExemptEncryption: false
        NSQuitAlwaysKeepsWindows: false
        UIBackgroundModes:
          - remote-notification
        NSLocationWhenInUseUsageDescription: "Scout uses your location to show nearby areas on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Scout uses your location to record GPS tracks during scouting trips."
        NSLocationUsageDescription: "Scout uses your location to show nearby areas on the map."
        NSCameraUsageDescription: "Scout uses the camera to capture location photos."
        NSPhotoLibraryUsageDescription: "Scout imports geotagged photos from your library."
        UILaunchScreen:
          UIColorName: "AccentColor"
        LSApplicationCategoryType: "public.app-category.productivity"

  ScoutTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - ScoutKit/Tests/ScoutKitTests
    dependencies:
      - package: ScoutKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cutetech.scout.tests
        DEVELOPMENT_TEAM: 2J8M8Z4QCX
