name: Scout
options:
  bundleIdPrefix: com.scout
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  ScoutKit:
    path: ScoutKit

targets:
  Scout:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Scout/Sources
      - path: Scout/Preview Content
        buildPhase: none
        type: folder
    resources:
      - Scout/Resources/Assets.xcassets
      - path: Scout/Preview Content
        buildPhase: resources
    dependencies:
      - package: ScoutKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scout.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    info:
      path: Scout/Info.plist
      properties:
        NSLocationWhenInUseUsageDescription: "Scout uses your location to show nearby areas on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Scout uses your location to record GPS tracks during scouting trips."
        NSCameraUsageDescription: "Scout uses the camera to capture location photos."
        NSPhotoLibraryUsageDescription: "Scout imports geotagged photos from your library."
        UILaunchScreen:
          UIColorName: "AccentColor"
        LSApplicationCategoryType: "public.app-category.productivity"

  ScoutTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - ScoutKit/Tests/ScoutKitTests
    dependencies:
      - package: ScoutKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scout.tests
